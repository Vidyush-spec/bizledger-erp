<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchase Orders — BizLedger ERP</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #2563eb; --brand-dark: #1d4ed8;
      --bg: #f1f5f9; --card: #ffffff;
      --text: #0f172a; --muted: #64748b;
      --border: #e2e8f0; --danger: #dc2626;
      --success: #16a34a;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); min-height: 100vh; }
    .topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .topbar a { font-size: 0.875rem; color: var(--brand); text-decoration: none; }
    .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
    .actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .btn { padding: 0.6rem 1.2rem; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; }
    .btn-primary { background: var(--brand); color: white; }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; border-radius: 6px; cursor: pointer; border: none; font-weight: 500; }
    .btn-success { background: #dcfce7; color: var(--success); }
    .btn-danger { background: #fef2f2; color: var(--danger); }
    .card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8fafc; padding: 0.75rem 1rem; text-align: left; font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); }
    td { padding: 0.875rem 1rem; font-size: 0.875rem; color: var(--text); border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
    .badge-ordered { background: #dbeafe; color: #1d4ed8; }
    .badge-partial { background: #fef9c3; color: #854d0e; }
    .badge-received { background: #dcfce7; color: #166534; }
    .badge-cancelled { background: #f1f5f9; color: var(--muted); }
    .empty { text-align: center; padding: 3rem; color: var(--muted); }
    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--card); border-radius: 16px; padding: 2rem; width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.8rem; font-weight: 600; color: var(--muted); }
    input, select, textarea { padding: 0.6rem 0.875rem; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.875rem; color: var(--text); outline: none; width: 100%; }
    input:focus, select:focus { border-color: var(--brand); }
    .items-section { margin-top: 1.25rem; }
    .items-section h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.75rem; }
    .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr auto; gap: 0.5rem; align-items: end; margin-bottom: 0.5rem; }
    .add-item-btn { background: none; border: 1.5px dashed var(--border); border-radius: 8px; padding: 0.5rem; width: 100%; color: var(--muted); cursor: pointer; font-size: 0.875rem; margin-top: 0.5rem; }
    .add-item-btn:hover { border-color: var(--brand); color: var(--brand); }
    .remove-btn { background: #fef2f2; border: none; border-radius: 6px; padding: 0.5rem 0.75rem; cursor: pointer; color: var(--danger); font-size: 0.875rem; }
    .modal-footer { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }
    .btn-outline { background: none; border: 1.5px solid var(--border); color: var(--text); }
    .total-line { text-align: right; font-size: 0.875rem; font-weight: 600; margin-top: 0.75rem; color: var(--text); }
  </style>
</head>
<body>
<div class="topbar">
  <h1>🛒 Purchase Orders</h1>
  <a href="/index.html">← Back to Dashboard</a>
</div>
<div class="container">
  <div class="actions">
    <span id="poCount" style="font-size:0.875rem;color:var(--muted)">Loading...</span>
    <button class="btn btn-primary" onclick="openModal()">+ New Purchase Order</button>
  </div>
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>PO No.</th>
          <th>Vendor</th>
          <th>Order Date</th>
          <th>Expected</th>
          <th>Amount</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="poTable"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<!-- New PO Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>New Purchase Order</h2>
    <div class="form-grid">
      <div class="form-group">
        <label>Vendor Name *</label>
        <input type="text" id="vendorName" placeholder="Supplier name" />
      </div>
      <div class="form-group">
        <label>Vendor GSTIN</label>
        <input type="text" id="vendorGstin" placeholder="Optional" />
      </div>
      <div class="form-group">
        <label>Order Date *</label>
        <input type="date" id="orderDate" />
      </div>
      <div class="form-group">
        <label>Expected Delivery</label>
        <input type="date" id="expectedDate" />
      </div>
      <div class="form-group full">
        <label>Notes</label>
        <input type="text" id="notes" placeholder="Optional notes" />
      </div>
    </div>
    <div class="items-section">
      <h3>Items</h3>
      <div id="itemRows"></div>
      <button class="add-item-btn" onclick="addItemRow()">+ Add Item</button>
      <div class="total-line" id="totalLine">Total: ₹0.00</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitPO()">Create PO</button>
    </div>
  </div>
</div>

<script>
const API = 'https://bizledger-erp-production.up.railway.app/api';
const token = localStorage.getItem('bl_token');
if (!token) window.location.href = '/login.html';

let products = [];

async function loadProducts() {
  const res = await fetch(`${API}/products`, { headers: { Authorization: `Bearer ${token}` } });
  const data = await res.json();
  products = Array.isArray(data) ? data : (data.data || []);
}

async function loadPOs() {
  try {
    const res = await fetch(`${API}/purchase-orders`, { headers: { Authorization: `Bearer ${token}` } });
    const data = await res.json();
    const pos = Array.isArray(data) ? data : [];
    document.getElementById('poCount').textContent = `${pos.length} Purchase Order${pos.length !== 1 ? 's' : ''}`;
    const tbody = document.getElementById('poTable');
    if (pos.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty">No purchase orders yet. Create one!</td></tr>';
      return;
    }
    tbody.innerHTML = pos.map(po => `
      <tr>
        <td><strong>${po.poNo}</strong></td>
        <td>${po.vendorName}</td>
        <td>${new Date(po.orderDate).toLocaleDateString('en-IN')}</td>
        <td>${po.expectedDate ? new Date(po.expectedDate).toLocaleDateString('en-IN') : '—'}</td>
        <td>₹${Number(po.totalAmount).toLocaleString('en-IN', {minimumFractionDigits:2})}</td>
        <td><span class="badge badge-${po.status.toLowerCase()}">${po.status}</span></td>
        <td>
          ${po.status === 'ORDERED' ? `<button class="btn-sm btn-success" onclick="updateStatus('${po.id}','RECEIVED')">Mark Received</button>` : ''}
          ${po.status === 'ORDERED' ? `<button class="btn-sm btn-danger" style="margin-left:4px" onclick="updateStatus('${po.id}','CANCELLED')">Cancel</button>` : ''}
        </td>
      </tr>
    `).join('');
  } catch(e) {
    document.getElementById('poTable').innerHTML = '<tr><td colspan="7" class="empty">Failed to load purchase orders.</td></tr>';
  }
}

function openModal() {
  document.getElementById('vendorName').value = '';
  document.getElementById('vendorGstin').value = '';
  document.getElementById('orderDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('expectedDate').value = '';
  document.getElementById('notes').value = '';
  document.getElementById('itemRows').innerHTML = '';
  document.getElementById('totalLine').textContent = 'Total: ₹0.00';
  addItemRow();
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function addItemRow() {
  const div = document.createElement('div');
  div.className = 'item-row';
  div.innerHTML = `
    <select onchange="calcTotal()">
      <option value="">Select product</option>
      ${products.map(p => `<option value="${p.id}" data-cost="${p.costPrice}">${p.name} (${p.sku})</option>`).join('')}
    </select>
    <input type="number" placeholder="Qty" min="1" value="1" oninput="calcTotal()" />
    <input type="number" placeholder="Rate ₹" min="0" step="0.01" oninput="calcTotal()" />
    <button class="remove-btn" onclick="this.parentElement.remove();calcTotal()">✕</button>
  `;
  div.querySelector('select').addEventListener('change', function() {
    const opt = this.options[this.selectedIndex];
    const cost = opt.dataset.cost;
    if (cost) div.querySelectorAll('input')[1].value = cost;
    calcTotal();
  });
  document.getElementById('itemRows').appendChild(div);
}

function calcTotal() {
  let total = 0;
  document.querySelectorAll('.item-row').forEach(row => {
    const qty = parseFloat(row.querySelectorAll('input')[0].value) || 0;
    const rate = parseFloat(row.querySelectorAll('input')[1].value) || 0;
    total += qty * rate;
  });
  document.getElementById('totalLine').textContent = `Total: ₹${total.toLocaleString('en-IN', {minimumFractionDigits:2})}`;
}

async function submitPO() {
  const vendorName = document.getElementById('vendorName').value.trim();
  const orderDate = document.getElementById('orderDate').value;
  if (!vendorName || !orderDate) { alert('Vendor name and order date are required.'); return; }

  const itemRows = document.querySelectorAll('.item-row');
  const items = [];
  for (const row of itemRows) {
    const productId = row.querySelector('select').value;
    const qty = parseFloat(row.querySelectorAll('input')[0].value);
    const rate = parseFloat(row.querySelectorAll('input')[1].value);
    if (!productId || !qty || !rate) { alert('Please fill all item fields.'); return; }
    items.push({ productId, quantity: qty, rate });
  }
  if (items.length === 0) { alert('Add at least one item.'); return; }

  const totalAmount = items.reduce((s, i) => s + i.quantity * i.rate, 0);

  const body = {
    vendorName,
    vendorGstin: document.getElementById('vendorGstin').value.trim() || null,
    orderDate,
    expectedDate: document.getElementById('expectedDate').value || null,
    notes: document.getElementById('notes').value.trim() || null,
    totalAmount,
    items,
  };

  try {
    const res = await fetch(`${API}/purchase-orders`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error('Failed to create PO');
    closeModal();
    loadPOs();
  } catch(e) {
    alert('Error creating purchase order. Please try again.');
  }
}

async function updateStatus(id, status) {
  if (!confirm(`Mark this PO as ${status}?`)) return;
  await fetch(`${API}/purchase-orders/${id}/status`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
    body: JSON.stringify({ status }),
  });
  loadPOs();
}

// Init
loadProducts().then(() => loadPOs());
</script>
</body>
</html>
