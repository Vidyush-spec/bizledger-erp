<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizLedger ERP — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brand: #2563eb; --brand-dark: #1d4ed8;
      --danger: #dc2626; --bg: #f1f5f9;
      --card: #ffffff; --text: #0f172a;
      --muted: #64748b; --border: #e2e8f0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .card {
      background: var(--card); border-radius: 16px;
      padding: 2.5rem 2rem; width: 100%; max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; }
    .logo-icon {
      width: 40px; height: 40px; background: var(--brand);
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 1.2rem;
    }
    .logo-text h1 { font-size: 1.25rem; font-weight: 700; color: var(--text); }
    .logo-text p  { font-size: 0.75rem; color: var(--muted); }
    h2 { font-size: 1.5rem; font-weight: 700; color: var(--text); margin-bottom: 0.25rem; }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.75rem; }
    .field { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.875rem; font-weight: 500; color: var(--text); margin-bottom: 0.4rem; }
    input {
      width: 100%; padding: 0.65rem 0.875rem;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.9rem; color: var(--text); outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: var(--brand); }
    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 2.5rem; }
    .toggle-pw {
      position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1rem;
    }
    .error-box {
      display: none; background: #fef2f2; border: 1px solid #fecaca;
      border-radius: 8px; padding: 0.75rem 1rem;
      color: var(--danger); font-size: 0.875rem; margin-bottom: 1.25rem;
    }
    .error-box.show { display: block; }
    .btn {
      width: 100%; padding: 0.75rem; background: var(--brand);
      color: white; border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s; display: flex;
      align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn:hover:not(:disabled) { background: var(--brand-dark); }
    .btn:disabled { opacity: 0.65; cursor: not-allowed; }
    .spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .btn.loading .spinner { display: block; }
    .btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { margin-top: 1.5rem; text-align: center; font-size: 0.8rem; color: var(--muted); }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">📒</div>
    <div class="logo-text">
      <h1>BizLedger</h1>
      <p>ERP Platform · v1.0</p>
    </div>
  </div>
  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to your account to continue</p>
  <div class="error-box" id="errorBox"></div>
  <form id="loginForm">
    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="admin@bizledger.in" required autocomplete="email" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
        <button type="button" class="toggle-pw" id="togglePw">👁</button>
      </div>
    </div>
    <button type="submit" class="btn" id="loginBtn">
      <span class="btn-text">Sign in</span>
      <span class="spinner"></span>
    </button>
  </form>
  <div class="footer">BizLedger ERP · Secure login</div>
</div>
<script>
  const API_BASE = 'https://bizledger-erp-production.up.railway.app/api';
  if (localStorage.getItem('bl_token')) window.location.href = '/index.html';
  document.getElementById('togglePw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    const errorBox = document.getElementById('errorBox');
    errorBox.classList.remove('show');
    btn.classList.add('loading');
    btn.disabled = true;
    try {
      const res = await fetch(`${API_BASE}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || 'Login failed');
      localStorage.setItem('bl_token', data.accessToken);
      localStorage.setItem('bl_user', JSON.stringify(data.user));
      window.location.href = '/index.html';
    } catch (err) {
      errorBox.textContent = err.message || 'Unable to connect. Please try again.';
      errorBox.classList.add('show');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
